<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1836" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Relais 12s" />
  <title>Relais 12s</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <style>
    :root {
      --bg1: #071225;
      --bg2: #0b1836;
      --card: rgba(10, 22, 48, 0.90);
      --card-border: rgba(255,255,255,0.14);
      --text: #f8fbff;
      --muted: #c5d6f4;
      --blue: #2e79ff;
      --blue2: #6eb2ff;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f2c94c;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: radial-gradient(circle at top, #12376f 0%, var(--bg2) 35%, var(--bg1) 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    body { min-height: 100vh; }
    .app {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 16px 16px 64px;
      position: relative;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .brand img.logo {
      width: clamp(70px, 12vw, 100px);
      height: clamp(70px, 12vw, 100px);
      object-fit: contain;
      border-radius: 22px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.28);
      background: rgba(255,255,255,0.08);
    }
    .brand-text h1 {
      margin: 0;
      font-size: clamp(1.55rem, 3.2vw, 2.5rem);
      line-height: 1;
    }
    .brand-text .sub {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      font-size: clamp(.82rem, 1.6vw, 1rem);
    }
    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 900px) {
      .grid { grid-template-columns: 380px 1fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 26px;
      padding: 16px;
      box-shadow: 0 14px 30px rgba(0,0,0,0.24);
      backdrop-filter: blur(8px);
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 1.08rem;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .row + .row { margin-top: 12px; }
    label { font-weight: 800; }
    input[type="number"] {
      width: 120px;
      background: rgba(3, 10, 22, 0.88);
      color: var(--text);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 1rem;
      font-weight: 700;
    }
    button, a.dl {
      appearance: none;
      border: none;
      border-radius: 18px;
      padding: 13px 15px;
      min-height: 50px;
      font-size: 1rem;
      font-weight: 800;
      color: white;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    button.primary { background: linear-gradient(135deg, #1d63ff, #5ba1ff); box-shadow: 0 10px 20px rgba(46,121,255,.33); }
    button.secondary { background: linear-gradient(135deg, #31415f, #5d6f90); }
    button.success { background: linear-gradient(135deg, #139245, #22c55e); box-shadow: 0 10px 20px rgba(34,197,94,.23); }
    button.warn { background: linear-gradient(135deg, #d29812, #f2c94c); color: #13233f; box-shadow: 0 10px 20px rgba(242,201,76,.26); }
    button.danger { background: linear-gradient(135deg, #c52d2d, #ef4444); box-shadow: 0 10px 20px rgba(239,68,68,.23); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .full { width: 100%; }
    .split > * { flex: 1 1 0; }
    .timer {
      margin-top: 8px;
      border-radius: 28px;
      min-height: 210px;
      border: 1px solid var(--card-border);
      background:
        radial-gradient(circle at top, rgba(91,161,255,.18), transparent 54%),
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)),
        rgba(5, 14, 29, 0.95);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
    }
    .time {
      font-size: clamp(3.2rem, 12vw, 5.8rem);
      font-weight: 900;
      line-height: .95;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(110,178,255,.18);
    }
    .status { margin-top: 8px; color: var(--muted); font-size: 1rem; font-weight: 700; }
    .video-wrap {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background: #000;
      border: 1px solid var(--card-border);
      aspect-ratio: 3 / 4;
    }
    video, canvas.preview, img#photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }
    .camera-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 12px;
      pointer-events: none;
    }
    .pill {
      background: rgba(7, 18, 37, .78);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .92rem;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }
    .gallery { margin-top: 16px; }
    .gallery h2 { margin-bottom: 10px; }
    .hidden { display: none !important; }
    .footer-signature {
      position: fixed;
      right: 12px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      z-index: 20;
      color: rgba(255,255,255,.92);
      font-size: clamp(.9rem, 2vw, 1.05rem);
      font-style: italic;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.45);
      pointer-events: none;
    }
    .footer-note {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: .86rem;
    }
    @media (max-width: 620px) {
      .header { align-items: flex-start; flex-direction: column; }
      .top-actions { width: 100%; justify-content: stretch; }
      .top-actions > * { flex: 1 1 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <img class="logo" src="icon-square.png" alt="Logo Relais 12s" />
        <div class="brand-text">
          <h1>Relais 12s</h1>
          <div class="sub">Sprint • Décompte • Photo</div>
        </div>
      </div>
      <div class="top-actions">
        <button id="btnFullscreen" class="warn">Plein écran</button>
      </div>
    </header>

    <div class="grid">
      <section class="card">
        <h2>Réglages</h2>
        <div class="row">
          <label for="seconds">Durée</label>
          <input id="seconds" type="number" min="1" max="3600" value="12" />
          <span>secondes</span>
        </div>
        <div class="row">
          <button id="btnCamera" class="primary full">Autoriser / démarrer la caméra arrière</button>
        </div>
        <div class="row">
          <button id="btnStart" class="success full">Lancer le décompte</button>
        </div>
        <div class="row split">
          <button id="btnReset" class="secondary">Réinitialiser le décompte</button>
          <button id="btnStop" class="danger" disabled>Arrêter</button>
        </div>
        <div class="row">
          <button id="btnTestBeep" class="secondary full">Tester le bip</button>
        </div>

        <div class="timer">
          <div>
            <div id="timeDisplay" class="time">00:12</div>
            <div id="status" class="status">Prêt</div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Aperçu caméra</h2>
        <div class="video-wrap">
          <video id="video" playsinline autoplay muted></video>
          <canvas id="canvas" class="preview hidden"></canvas>
          <img id="photo" alt="Dernière photo capturée" class="hidden" />
          <div class="camera-overlay">
            <div class="pill" id="cameraState">Caméra inactive</div>
            <div class="pill">Capture auto</div>
          </div>
        </div>

        <div class="gallery">
          <a id="downloadLink" class="dl hidden" download="photo-relais-12s.png">Télécharger la photo</a>
        </div>
      </section>
    </div>

    <div class="footer-note">PWA locale — fonctionne mieux en HTTPS ou après installation.</div>
  </div>

  <div class="footer-signature">by Quentin Delisle</div>

  <script>
    const $ = (id) => document.getElementById(id);
    const secondsInput = $('seconds');
    const btnCamera = $('btnCamera');
    const btnStart = $('btnStart');
    const btnReset = $('btnReset');
    const btnStop = $('btnStop');
    const btnTestBeep = $('btnTestBeep');
    const btnFullscreen = $('btnFullscreen');
    const timeDisplay = $('timeDisplay');
    const statusEl = $('status');
    const video = $('video');
    const canvas = $('canvas');
    const photo = $('photo');
    const downloadLink = $('downloadLink');
    const cameraState = $('cameraState');

    let stream = null;
    let countdownTimer = null;
    let remaining = Number(secondsInput.value || 12);
    let audioCtx = null;
    let takingPhoto = false;
    let lastObjectUrl = null;

    function fmt(seconds) {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function renderTime() {
      timeDisplay.textContent = fmt(remaining);
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function strongBeepPattern() {
      const ctx = ensureAudio();
      const total = 3;
      for (let i = 0; i < total; i++) {
        const start = ctx.currentTime + i * 0.16;
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain = ctx.createGain();
        osc1.type = 'square';
        osc2.type = 'triangle';
        osc1.frequency.setValueAtTime(2200, start);
        osc2.frequency.setValueAtTime(3150, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.42, start + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.12);
        osc1.connect(gain);
        osc2.connect(gain);
        gain.connect(ctx.destination);
        osc1.start(start);
        osc2.start(start);
        osc1.stop(start + 0.13);
        osc2.stop(start + 0.13);
      }
      if (navigator.vibrate) navigator.vibrate([80, 30, 80, 30, 80]);
    }

    async function startCamera() {
      stopCamera();
      try {
        setStatus('Demande d’autorisation caméra...');
        const baseConstraints = {
          video: {
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            facingMode: { exact: 'environment' }
          },
          audio: false
        };

        try {
          stream = await navigator.mediaDevices.getUserMedia(baseConstraints);
        } catch (err) {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: 1920 },
              height: { ideal: 1080 },
              facingMode: { ideal: 'environment' }
            },
            audio: false
          });
        }

        video.srcObject = stream;
        await video.play();
        cameraState.textContent = 'Caméra active';
        setStatus('Caméra prête');
      } catch (err) {
        cameraState.textContent = 'Caméra inactive';
        setStatus('Accès caméra refusé ou indisponible');
        alert('Impossible d’accéder à la caméra arrière. Vérifie les permissions et utilise HTTPS ou une PWA installée.');
        console.error(err);
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
      cameraState.textContent = 'Caméra inactive';
    }

    async function capturePhoto() {
      if (takingPhoto) return;
      takingPhoto = true;
      try {
        if (!stream) {
          setStatus('Décompte terminé — pas de caméra active');
          return;
        }

        const track = stream.getVideoTracks()[0];
        let blob = null;

        if ('ImageCapture' in window && track) {
          try {
            const imageCapture = new ImageCapture(track);
            blob = await imageCapture.takePhoto();
          } catch (e) {
            console.warn('takePhoto indisponible, fallback canvas', e);
          }
        }

        if (!blob) {
          const w = video.videoWidth || 1080;
          const h = video.videoHeight || 1440;
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(video, 0, 0, w, h);
          blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png', 1));
        }

        if (lastObjectUrl) URL.revokeObjectURL(lastObjectUrl);
        const url = URL.createObjectURL(blob);
        lastObjectUrl = url;
        photo.src = url;
        photo.classList.remove('hidden');
        canvas.classList.add('hidden');
        downloadLink.href = url;
        downloadLink.classList.remove('hidden');
        setStatus('Photo capturée');
      } catch (err) {
        console.error(err);
        setStatus('Erreur pendant la capture');
      } finally {
        takingPhoto = false;
      }
    }

    function stopCountdown() {
      if (countdownTimer) {
        clearInterval(countdownTimer);
        countdownTimer = null;
      }
      btnStart.disabled = false;
      btnStop.disabled = true;
    }

    function resetCountdown() {
      stopCountdown();
      remaining = Math.max(1, Number(secondsInput.value || 12));
      renderTime();
      setStatus('Décompte réinitialisé');
    }

    async function startCountdown() {
      ensureAudio();
      stopCountdown();
      remaining = Math.max(1, Number(secondsInput.value || 12));
      renderTime();
      btnStart.disabled = true;
      btnStop.disabled = false;
      setStatus('Décompte en cours...');

      countdownTimer = setInterval(async () => {
        remaining -= 1;
        renderTime();
        if (remaining <= 0) {
          stopCountdown();
          strongBeepPattern();
          setStatus('Bip ! Capture photo...');
          await capturePhoto();
          remaining = Math.max(1, Number(secondsInput.value || 12));
          renderTime();
        }
      }, 1000);
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (err) {
        console.warn('Plein écran non disponible', err);
      }
    }

    secondsInput.addEventListener('input', () => {
      remaining = Math.max(1, Number(secondsInput.value || 12));
      renderTime();
    });

    btnCamera.addEventListener('click', startCamera);
    btnStart.addEventListener('click', startCountdown);
    btnStop.addEventListener('click', () => {
      stopCountdown();
      setStatus('Décompte arrêté');
      remaining = Math.max(1, Number(secondsInput.value || 12));
      renderTime();
    });
    btnReset.addEventListener('click', resetCountdown);
    btnTestBeep.addEventListener('click', strongBeepPattern);
    btnFullscreen.addEventListener('click', toggleFullscreen);

    window.addEventListener('beforeunload', stopCamera);
    renderTime();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
      });
    }
  </script>
</body>
</html>
